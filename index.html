<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLENS // V1.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>NLENS</h1>
            <p>Autonomous Assistive Navigation // System 01</p>
            <div id="status-badge" class="badge connecting">System Standby</div>
        </header>

        <main class="grid">
            <section class="card distance-card">
                <h2>Proximity Data</h2>
                <div class="distance-display">
                    <span id="distance-value">00</span>
                    <span class="unit">cm</span>
                </div>
                <div id="alert-bar" class="alert-bar"></div>
                <p id="alert-text">SCANNING ENVIRONMENT...</p>
            </section>

            <section class="card info-card">
                <h2>Telemetry Module</h2>
                <div class="status-grid">
                    <div class="status-box">
                        <div class="status-label">Signal</div>
                        <div id="wifi-status" class="status-value">--</div>
                    </div>
                    <div class="status-box">
                        <div class="status-label">Haptics</div>
                        <div id="haptic-status" class="status-value">--</div>
                    </div>
                    <div class="status-box">
                        <div class="status-label">Audio</div>
                        <div id="buzzer-status" class="status-value">--</div>
                    </div>
                </div>
                <div style="margin-top: 24px; padding: 15px; background: rgba(14, 165, 233, 0.1); border-radius: 8px; border-left: 4px solid var(--accent);">
                    <div style="font-size: 0.7rem; color: var(--accent); font-weight: bold;">SYSTEM DIAGNOSTIC</div>
                    <div style="font-size: 0.85rem; margin-top: 4px;">Hardware link stable. Environmental analysis active.</div>
                </div>
            </section>

            <section class="card graph-card">
                <h2>Spatial Mapping (Distance/Time)</h2>
                <div style="height: 300px;">
                    <canvas id="distanceChart"></canvas>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
